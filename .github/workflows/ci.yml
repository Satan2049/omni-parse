name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build Rust API
        run: cargo build --release --bin omniparse-server

      - name: Build desktop crate
        run: cargo build --release -p omniparse

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Enforce npm registry
        run: |
          npm config set registry https://registry.npmjs.org/
          if grep -q 'npmmirror' frontend/package-lock.json; then
            echo "::error::package-lock.json must not reference npmmirror.com"
            exit 1
          fi

      - name: Install dependencies
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        run: |
          npm cache clean --force
          npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
